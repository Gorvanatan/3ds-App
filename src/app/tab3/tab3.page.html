<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Favourites</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="empty-state" *ngIf="favourites.length === 0">
    <p>No favourites yet — tap the heart on any console to save it here.</p>
  </div>

  <ion-list *ngIf="favourites.length > 0">
    <ion-item
      *ngFor="let console of favourites"
      [routerLink]="['/tabs/tab2', console.id]"
      detail="true"
      button>
      <ion-label>
        <h2>{{ console.name }}</h2>
        <p>Released: {{ console.releaseDate }}</p>
        <p>{{ console.price }}</p>
      </ion-label>
      <ion-badge slot="end" [color]="console.platform === 'ds' ? 'warning' : 'primary'">
        {{ console.platform === 'ds' ? 'DS' : '3DS' }}
      </ion-badge>
    </ion-item>
  </ion-list>
</ion-content>
